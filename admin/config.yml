backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle / Description", name: "dek", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["culture", "politics", "opinion", "sports", "literature", "music", "debate"] }
      - { label: "Author", name: "author", widget: "string", default: "Staff Writer" }
      - { label: "Date", name: "date", widget: "datetime", format: "DD MMM YYYY" }
      - { label: "Body", name: "body", widget: "text" }
